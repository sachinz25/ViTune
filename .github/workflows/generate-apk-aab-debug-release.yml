name: Generate APK (Direct Artifact Download)

env:
  main_project_module: app

on:
  push:
    branches:
      - 'master'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Change Gradle wrapper permissions
        run: chmod +x ./gradlew

      - name: Build APK
        run: ./gradlew ${{ env.main_project_module }}:assembleRelease

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Generated APK
          path: ${{ env.main_project_module }}/build/outputs/apk/release/*.apk
